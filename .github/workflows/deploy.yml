# GitHub Pages 배포 — config.js 를 레포 Secret 에서 생성해 주입한다.
# (config.js 는 .gitignore 라 레포에 없음 → 여기서 배포 시점에 만든다)
#
# 사전 준비: 레포 Settings → Secrets and variables → Actions 에 아래 2개 등록
#   SUPABASE_URL       = https://ihovzfhyutfcqaslpazc.supabase.co
#   SUPABASE_ANON_KEY  = sb_publishable_6YLEfaAk_RufiSxyrsVhwA_na37m-o2
# 그리고 Settings → Pages → Source 를 "GitHub Actions" 로 설정.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate config.js from secrets
        run: |
          cat > config.js <<EOF
          window.UG_CONFIG = {
            SUPABASE_URL: "${{ secrets.SUPABASE_URL }}",
            SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
          };
          EOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
